interface:
  display_name: "Tgmeng News and Index Search"
  short_description: "Search Tgmeng hotspots and Tgmeng Index data"
  default_prompt: "Use $tgmeng-news-skill to search Tgmeng news, hotspot data, and Tgmeng Index data. If the user request is ambiguous between raw hotspot search and Tgmeng Index search, ask which capability they want before calling an API. Use limit null by default; do not set a concrete limit unless the user explicitly requested or confirmed a result count."
policy:
  allow_implicit_invocation: true
