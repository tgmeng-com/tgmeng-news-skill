interface:
  display_name: "Tgmeng News, Index, and Daily Reports"
  short_description: "Search Tgmeng hotspots, Tgmeng Index data, and generated daily reports"
  default_prompt: "Use $tgmeng-news-skill to search Tgmeng news, hotspot data, Tgmeng Index data, and generated daily reports. If the user request is ambiguous between raw hotspot search, Tgmeng Index search, and Daily News query, ask which capability they want before calling an API. Use limit null by default; do not set a concrete limit unless the user explicitly requested or confirmed a result count. For Daily News, use withContent true when the user wants report body or Markdown, and false only for lists or metadata."
policy:
  allow_implicit_invocation: true
